services:
  - type: web
    name: codekata
    runtime: ruby
    plan: free
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: BUNDLE_WITHOUT
        value: "development:test"
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: codekata-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: codekata-redis
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: JUDGE0_API_KEY
        sync: false

  - type: redis
    name: codekata-redis
    plan: free
    maxmemoryPolicy: noeviction

databases:
  - name: codekata-db
    databaseName: codekata_production
    plan: free
